<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="trade.xyz 24x7 链上永续合约行情看板" />
    <title>Stock247 · trade.xyz 行情</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div>
          <p class="eyebrow">STOCK247 · TRADE.XYZ</p>
          <h1>24x7 链上永续合约行情</h1>
          <p class="subtitle">仅展示 trade.xyz / Hyperliquid xyz DEX 合约数据，不包含传统股票报价。</p>
        </div>
        <div class="status-box" aria-live="polite">
          <span id="status-dot" class="status-dot"></span>
          <div>
            <strong id="status-text">正在连接</strong>
            <small id="updated-at">尚未更新</small>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="controls" aria-label="行情控制">
        <label class="search-field">
          <span>搜索合约</span>
          <input id="search-input" type="search" placeholder="例如 AAPL、NVDA、xyz:TSLA" autocomplete="off" />
        </label>
        <label class="select-field">
          <span>排序</span>
          <select id="sort-select">
            <option value="volume">24H 成交额</option>
            <option value="change">24H 涨跌幅</option>
            <option value="openInterest">持仓量</option>
            <option value="symbol">代码</option>
          </select>
        </label>
        <button id="refresh-button" class="refresh-button" type="button">刷新行情</button>
      </section>

      <section id="notice" class="notice" hidden></section>
      <section id="loading" class="loading-panel">正在读取 trade.xyz 行情…</section>

      <section id="market-panel" hidden>
        <div class="section-heading">
          <div>
            <h2>热门合约</h2>
            <p>默认按 24H 名义成交额排序，最多展示 20 个标的。</p>
          </div>
          <strong id="result-count">0 个合约</strong>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>合约</th>
                <th>价格</th>
                <th>24H 涨跌</th>
                <th>24H 成交额</th>
                <th>持仓量</th>
                <th>Funding</th>
                <th>价格来源</th>
              </tr>
            </thead>
            <tbody id="market-table-body"></tbody>
          </table>
        </div>

        <div id="market-cards" class="market-cards"></div>
      </section>
    </main>

    <footer>
      <p>数据源：trade.xyz / Hyperliquid xyz DEX。页面仅提供行情展示，不构成投资建议。</p>
    </footer>

    <script type="module" src="/client.js"></script>
  </body>
</html>
