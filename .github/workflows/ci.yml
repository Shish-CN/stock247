name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --check client.js
      - run: node --check api/health.mjs
      - run: node --check api/markets.mjs
      - run: node --check api/quote.mjs
      - run: node --test test/hyperliquid.test.mjs
      - run: test -f index.html && test -f styles.css && test -f favicon.svg
